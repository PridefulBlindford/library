<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Welcome to the library</h1>
    <button class="add-book" command="show-modal" commandfor="add-book-dialog">Add a book</button>
    <dialog id="add-book-dialog">
        <form class="add-book-form" method="post " action="">
            <div>
                <label for="book-title">Book Title:</label>
                <input type="text" name="book-title" id="book-title">
            </div>
            <div>
                <label for="book-author">Author:</label>
                <input type="text" name="book-author" id="book-author">
            </div>
            <div>
                <label for="page-number">Number of pages:</label>
                <input type="number" name="page-number" id="page-number" min="1">
            </div>
            <div>
                <label for="read-book">I have read this book before</label>
                <input type="checkbox" name="read-book" id="read-book">
            </div>
            <div>

            <button class="new-book">Submit</button>
                
            </div>
        </form>
        <button command="Close" commandfor="add-book-dialog">Close</button>
    </dialog>
    <table>
        <thead>
            <tr id="heading">
                <th scope="col">Title</th>
                <th scope="col">Author</th>
                <th scope="col">Number of Pages</th>
                <th scope="col">Has it been read yet?</th>
                <th scope="col">Remove</th>
            </tr>
        </thead>
        <tbody class="table-body">

        </tbody>
    </table>
</body>
</html>
